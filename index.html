<!doctype html>
<html lang= "en">
<head>
	<meta name="viewport" content="width = device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
	<title>Enkelt Piano</title>

	<!-- polyfill -->
	<script src="libs/MIDI.js-master/inc/shim/Base64.js" type="text/javascript"></script>
	<script src="libs/MIDI.js-master/inc/shim/Base64binary.js" type="text/javascript"></script>
	<script src="libs/MIDI.js-master/inc/shim/WebAudioAPI.js" type="text/javascript"></script>
	<!-- midi.js package -->
	<script src="libs/MIDI.js-master/js/midi/audioDetect.js" type="text/javascript"></script>
	<script src="libs/MIDI.js-master/js/midi/gm.js" type="text/javascript"></script>
	<script src="libs/MIDI.js-master/js/midi/loader.js" type="text/javascript"></script>
	<script src="libs/MIDI.js-master/js/midi/plugin.audiotag.js" type="text/javascript"></script>
	<script src="libs/MIDI.js-master/js/midi/plugin.webaudio.js" type="text/javascript"></script>
	<script src="libs/MIDI.js-master/js/midi/plugin.webmidi.js" type="text/javascript"></script>
	<!-- utils -->
	<script src="libs/MIDI.js-master/js/util/dom_request_xhr.js" type="text/javascript"></script>
	<script src="libs/MIDI.js-master/js/util/dom_request_script.js" type="text/javascript"></script>

	<!-- jQuery -->
	<script type = "text/javascript" src = "js/jquery.js"></script>

	<!-- Style -->
	<link rel="stylesheet" href="css/main.css"/>

	<!-- Font-Awesome -->
	<link rel="stylesheet" href="css/font-awesome-4.3.0/css/font-awesome.min.css"/>

	<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

	<!-- Javascript -->
	<script type = "text/javascript" src = "js/midi/play.js"></script>
	<script type = "text/javascript" src = "js/classes/key.js"></script>
	<script type = "text/javascript" src = "js/script.js"></script>

</head>
<body>
	<h1 style = "opacity: 0; position: absolute; top:0; left: 0;" >Enkelt Piano</h1>
	<div id = "loadingState">
		<div id = "loadingText">Laster inn ...</div>
	</div>

	<div id="tabBar">
		<button class="tab active" data-tab="notes">Noter</button>
		<button class="tab" data-tab="keyboard">Tastatur</button>
		<button class="tab" data-tab="clean">Rensk</button>
	</div>

	<div id = "pianoContainer"></div>
	<script>
		document.querySelectorAll('.tab').forEach(function(btn) {
			btn.addEventListener('click', function() {
				document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
				btn.classList.add('active');
				document.body.className = btn.dataset.tab === 'keyboard' ? 'tab-keyboard' : btn.dataset.tab === 'clean' ? 'tab-clean' : '';
			});
		});
	</script>
</body>
</html>
